name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-node@v4"
        with:
          node-version: 20
          cache: npm
      - name: install
        run: npm ci
      - name: test
        run: npm test
  slither:
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-node@v4"
        with:
          node-version: 20
          cache: npm
      - name: install
        run: npm ci
      - name: compile
        run: npx hardhat compile
      - uses: "crytic/slither-action@v0.4.0"
        with:
          solc-version: "0.8.27"
          slither-args: '--filter-paths "node_modules|fhevmTemp" --exclude naming-convention,solc-version'
