name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-node@v4"
        with:
          node-version: 20
          cache: npm
      - name: install
        run: npm ci
      - name: test
        run: npm test
  slither:
    runs-on: ubuntu-latest
    steps:
      - uses: "actions/checkout@v4"
      - uses: "actions/setup-node@v4"
        with:
          node-version: 20
          cache: npm
      - name: install
        run: npm ci
      - name: install slither
        run: pip3 install slither-analyzer
      - name: compile
        run: npx hardhat compile
      - name: run slither
        run: |
          rm -f foundry.toml
          cp fhevmTemp/@fhevm/solidity/config/ZamaConfig.sol node_modules/@fhevm/solidity/config/ZamaConfig.sol
          slither . \
            --filter-paths "node_modules|fhevmTemp|test/invariant|contracts/test|contracts/zkemail" \
            --exclude naming-convention,solc-version,timestamp,assembly,low-level-calls,cyclomatic-complexity,redundant-statements,missing-inheritance,unused-state,constable-states,reentrancy-no-eth,reentrancy-benign,reentrancy-events,unused-return,uninitialized-state,incorrect-equality \
            --compile-force-framework hardhat \
            --ignore-compile
